<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Доступ запрещён</title>
    <style>
      body {
        margin: 0;
        padding: 0 15px;
        background: #00aeef;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .logo {
        width: 90px;
        margin: 20px;
      }

      .box {
        background: #fff;
        max-width: 800px;
        width: 100%;
        padding: 40px 28px;
        margin-top: 40px;
        border-radius: 20px;
        text-align: center;
        box-sizing: border-box;
      }

      .title {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 15px;
        color: #333;
      }

      .text {
        font-size: 16px;
        line-height: 1.4;
        color: #555;
      }

      @media (max-width: 480px) {
        .box {
          padding: 20px;
          border-radius: 16px;
        }
        .title {
          font-size: 22px;
        }
        .text {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Белый блок -->
    <div class="box">
      <div class="title">Доступ запрещён</div>
      <div class="text">
        Доступ к информационному ресурсу ограничен на основании Федерального Закона от 27 июля 2006 года № 149-ФЗ «Об
        информации, информационных технологиях и о защите информации».
      </div>
    </div>
  </body>
</html>
